name: Folder Size Check
on:
  workflow_dispatch:
  pull_request:
    paths:
      # Mirror SOURCE_EXTS from scripts/check_folder_sizes.sh:
      - '**.sh'
      - '**.bash'
      - '**.js'
      - '**.jsx'
      - '**.mjs'
      - '**.cjs'
      - '**.ts'
      - '**.tsx'
      - '**.py'
jobs:
  check-folder-sizes:
    name: Folder File Count Limit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check for oversized source folders
        run: |
          if [ -n "${{ github.event.pull_request.base.sha }}" ]; then
            mapfile -t files < <(git diff --name-only --diff-filter=d "${{ github.event.pull_request.base.sha }}...HEAD")
            if [ "${#files[@]}" -eq 0 ]; then
              echo "No files changed."
              exit 0
            fi
            # Script self-filters non-source files via SOURCE_EXTS, so pass them all.
            scripts/check_folder_sizes.sh "${files[@]}"
          else
            scripts/check_folder_sizes.sh --all
          fi
